name: Docker Compose Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Docker Compose Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Root & Frontend Dependencies
        run: |
          npm install
          npm install --prefix frontend

      - name: Compile Frontend Production Assets
        run: |
          npm run build --prefix frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker Compose
        run: |
          docker compose build

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and Push Images to Docker Hub
        run: |
          # Tag and push Backend
          docker tag balatro-lite-backend:latest ${{ secrets.DOCKERHUB_USERNAME }}/balatro-lite-backend:latest
          docker tag balatro-lite-backend:latest ${{ secrets.DOCKERHUB_USERNAME }}/balatro-lite-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/balatro-lite-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/balatro-lite-backend:${{ github.sha }}

          # Tag and push Frontend
          docker tag balatro-lite-frontend:latest ${{ secrets.DOCKERHUB_USERNAME }}/balatro-lite-frontend:latest
          docker tag balatro-lite-frontend:latest ${{ secrets.DOCKERHUB_USERNAME }}/balatro-lite-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/balatro-lite-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/balatro-lite-frontend:${{ github.sha }}
